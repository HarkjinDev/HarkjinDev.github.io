<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정보관리기술사 기출 토픽 마인드맵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF6F0;font-family:'Noto Sans KR',sans-serif;overflow:hidden;height:100vh;width:100vw}
svg{display:block;width:100%;height:100%}
#bar{position:absolute;top:0;left:0;right:0;z-index:40;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(250,246,240,.97) 60%,transparent 100%);pointer-events:none}
#bar h1{font-size:14px;font-weight:700;color:#5B4A3F;letter-spacing:.04em}
#bar span{font-size:9.5px;color:rgba(91,74,63,.38)}
#sbar{position:absolute;top:44px;left:50%;transform:translateX(-50%);z-index:40;display:flex}
#si{padding:7px 15px;font-size:11.5px;width:240px;border-radius:16px 0 0 16px;border:1px solid rgba(91,74,63,.15);border-right:none;background:rgba(255,252,248,.97);color:#3D2E22;font-family:'Noto Sans KR',sans-serif;outline:none}
#si:focus{border-color:rgba(91,74,63,.35)}
#si::placeholder{color:rgba(91,74,63,.28)}
#sx{padding:7px 11px;border-radius:0 16px 16px 0;border:1px solid rgba(91,74,63,.15);background:rgba(255,252,248,.97);color:#8B7A6B;cursor:pointer;font-size:11px;font-family:'Noto Sans KR',sans-serif}
#ctrl{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:8px}
.btn{padding:6px 14px;font-size:10.5px;border-radius:14px;border:1px solid rgba(91,74,63,.13);background:rgba(255,252,248,.94);color:#6B5D52;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .18s;backdrop-filter:blur(4px)}
.btn:hover{background:rgba(91,74,63,.08);border-color:rgba(91,74,63,.22)}
#ctr{position:absolute;top:44px;right:16px;z-index:40;font-size:9.5px;color:rgba(91,74,63,.38);text-align:right;line-height:1.7}
#legend{position:absolute;bottom:56px;left:14px;z-index:40;background:rgba(255,252,248,.92);border:1px solid rgba(91,74,63,.1);border-radius:10px;padding:9px 14px;backdrop-filter:blur(4px);display:grid;grid-template-columns:repeat(2,auto);gap:5px 16px}
.lg{display:flex;align-items:center;gap:6px;font-size:9px;color:rgba(91,74,63,.55);white-space:nowrap}
.lgd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#tt{position:absolute;z-index:60;max-width:280px;background:rgba(255,252,248,.98);border:1px solid rgba(91,74,63,.12);border-radius:10px;padding:12px 16px;pointer-events:none;opacity:0;transition:opacity .18s;box-shadow:0 4px 20px rgba(91,74,63,.1)}
#tt.show{opacity:1}
#tt h4{font-size:12px;font-weight:700;color:#3D2E22;margin-bottom:4px}
#tt-path{font-size:9px;color:rgba(91,74,63,.4);margin-bottom:5px;font-style:italic;line-height:1.5}
#tt-desc{font-size:10px;color:rgba(91,74,63,.6);line-height:1.72}
#tt-cat{display:inline-block;padding:2px 9px;border-radius:4px;font-size:9px;font-weight:600;margin-bottom:5px}
.nd-g{cursor:pointer}.nd-g .nc{transition:all .18s}.nd-g:hover .nc{filter:brightness(1.15)}
.nd-g.sh .nc{stroke:#3D2E22!important;stroke-width:2.5!important;filter:drop-shadow(0 0 6px rgba(91,74,63,.35))}
.nd-g.dm .nc{opacity:.08}.nd-g.dm .nl{opacity:.04}
.nl{pointer-events:none;font-family:'Noto Sans KR',sans-serif}
@keyframes pulse{0%,100%{stroke-opacity:.18}50%{stroke-opacity:.5}}
.pulse-ring{animation:pulse 2.2s ease-in-out infinite}
#hint{position:absolute;bottom:56px;right:14px;z-index:40;font-size:9px;color:rgba(91,74,63,.35);text-align:right;line-height:1.8;background:rgba(255,252,248,.85);border-radius:8px;padding:6px 10px;border:1px solid rgba(91,74,63,.08)}
#loading{position:fixed;inset:0;background:#FAF6F0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#loading.hide{opacity:0;pointer-events:none}
#loading p{color:#8B7A6B;font-size:13px;margin-top:14px}
.spinner{width:36px;height:36px;border:3px solid rgba(91,74,63,.12);border-top-color:#B4783C;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>마인드맵 생성 중…</p></div>
<div id="bar"><h1>📋 정보관리기술사 기출 토픽 마인드맵</h1><span>스크롤: 확대축소 | 드래그: 이동 | 도메인→분류→토픽 클릭 확장</span></div>
<div id="sbar"><input id="si" type="text" placeholder="🔍  토픽 검색 (예: 트랜스포머, 블록체인…)" oninput="doSearch(this.value)"><button id="sx" onclick="clearSearch()">✕</button></div>
<div id="ctr">전체 <b id="cnt">0</b>개 토픽 · <b>10</b>개 도메인</div>
<svg id="svg">
  <defs>
    <filter id="gf" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gf2" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g id="gall"><g id="glinks"></g><g id="gnodes"></g></g>
</svg>
<div id="ctrl">
  <button class="btn" onclick="expandAll()">⊕ 전체 펼치기</button>
  <button class="btn" onclick="collapseAll()">⊖ 전체 접기</button>
  <button class="btn" onclick="fitView()">⌂ 전체 보기</button>
  <button class="btn" onclick="svgZoom(1.4)">＋</button>
  <button class="btn" onclick="svgZoom(0.7)">－</button>
</div>
<div id="legend"></div>
<div id="hint">💡 도메인 → 분류 → 토픽<br>순서로 클릭하여 확장</div>
<div id="tt"><h4 id="tt-h"></h4><div id="tt-cat"></div><div id="tt-path"></div><div id="tt-desc"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

B('프로젝트 관리','bizpm','',[L('IT 프로젝트 관리'),L('프로그램 관리(Program Management)'),L('포트폴리오 관리(Portfolio Management)'),L('WBS(Work Breakdown Structure)'),L('터크만 모델(Tuckman Ladder Model)'),L('갈등관리(Conflict Management)'),L('프로젝트 위험관리(Project Risk Management)'),L('리스크 대응(Risk Response)'),L('획득가치관리(EVM, Earned Value Management)'),L('품질비용(Cost of Quality)'),L('CCPM(Critical Chain Project Management)'),L('CPM/PERT'),L('프로젝트 이해관계자 관리')])])
]);/* END TREE */

/* ══════════════ FLATTEN ══════════════ */
const ALL=[];
function flatten(node,pid,depth,pcat){
  const cat=node.cat||pcat||'root';
  const id=ALL.length;
  ALL.push({id,lb:node.lb,desc:node.desc||'',cat,depth,pid,x:0,y:0,fx:null,fy:null,childIds:[],_hidden:depth>=2});
  if(pid!==null) ALL[pid].childIds.push(id);
  if(node.ch) node.ch.forEach(c=>flatten(c,id,depth+1,cat));
}
flatten(TREE,null,0,'root');
document.getElementById('cnt').textContent=ALL.filter(n=>n.depth===3).length;

/* ══════════════ STATE ════════════════ */
const expandedDomains=new Set();
const expandedClasses=new Set();

function isVisible(n){
  if(n.depth<=1) return true;
  if(n.depth===2) return expandedDomains.has(n.pid);
  if(n.depth===3) return expandedDomains.has(ALL[n.pid].pid) && expandedClasses.has(n.pid);
  return false;
}
function refreshHidden(){ ALL.forEach(n=>n._hidden=!isVisible(n)); }

/* ══════════════ LAYOUT ══════════════ */
const RD=220; // root→domain

function layoutDomains(){
  ALL[0].x=0; ALL[0].y=0;
  const doms=ALL[0].childIds, n=doms.length;
  doms.forEach((did,i)=>{
    const a=-Math.PI/2+(2*Math.PI*i/n);
    ALL[did].x=RD*Math.cos(a); ALL[did].y=RD*Math.sin(a); ALL[did]._ba=a;
  });
}

function layoutClasses(domId){
  const dn=ALL[domId], ch=dn.childIds, nc=ch.length;
  const ba=dn._ba||Math.atan2(dn.y,dn.x);
  const spread=Math.min(Math.PI*.75, nc*.22);
  const dist=165;
  ch.forEach((cid,i)=>{
    const t=nc===1?0:(i/(nc-1)-.5);
    const a=ba+t*spread;
    ALL[cid].x=dn.x+dist*Math.cos(a); ALL[cid].y=dn.y+dist*Math.sin(a); ALL[cid]._ba=a;
  });
}

function layoutTopics360(clsId){
  const cn=ALL[clsId], ch=cn.childIds, nt=ch.length;
  const ba=cn._ba||Math.atan2(cn.y-ALL[cn.pid].y, cn.x-ALL[cn.pid].x);
  const spread=Math.min(Math.PI*.8, nt*.09);
  const dist=80+Math.max(0,(nt-6)*3);
  ch.forEach((tid,i)=>{
    const t=nt===1?0:(i/(nt-1)-.5);
    const a=ba+t*spread;
    ALL[tid].x=cn.x+dist*Math.cos(a); ALL[tid].y=cn.y+dist*Math.sin(a);
  });
}

function layoutFullRadial(){
  layoutDomains();
  ALL.filter(n=>n.depth===1).forEach(dn=>{
    const ch=dn.childIds, nc=ch.length;
    const ba=dn._ba||0;
    const spread=Math.min(Math.PI*.65, nc*.17);
    ch.forEach((cid,i)=>{
      const t=nc===1?0:(i/(nc-1)-.5);
      const a=ba+t*spread;
      ALL[cid].x=dn.x+160*Math.cos(a); ALL[cid].y=dn.y+160*Math.sin(a); ALL[cid]._ba=a;
      const tops=ALL[cid].childIds, nt=tops.length;
      const ts=Math.min(.45, nt*.035);
      tops.forEach((tid,j)=>{
        const tt=nt===1?0:(j/(nt-1)-.5);
        const ta=a+tt*ts;
        ALL[tid].x=ALL[cid].x+75*Math.cos(ta); ALL[tid].y=ALL[cid].y+75*Math.sin(ta);
      });
    });
  });
}

layoutDomains();

/* ══════════════ D3 ══════════════ */
const W=window.innerWidth, H=window.innerHeight;
const svg=d3.select('#svg').attr('width',W).attr('height',H);
const gAll=d3.select('#gall'), gLinks=d3.select('#glinks'), gNodes=d3.select('#gnodes');
let ndSel;

function countDesc(id){let c=0;ALL[id].childIds.forEach(cid=>{c++;c+=countDesc(cid);});return c;}

function buildVis(){
  refreshHidden();
  const vis=ALL.filter(n=>!n._hidden);
  const links=[];
  vis.forEach(n=>{ if(n.pid!==null&&!ALL[n.pid]._hidden) links.push({s:n.pid,t:n.id}); });

  /* Links */
  let lk=gLinks.selectAll('.hl').data(links,d=>d.s+'-'+d.t);
  lk.exit().transition().duration(300).attr('stroke-opacity',0).remove();
  lk=lk.enter().append('line').attr('class','hl').attr('stroke-opacity',0).merge(lk);
  lk.attr('stroke',d=>(CAT[ALL[d.t].cat]||CAT.root).c)
    .attr('stroke-width',d=>[0,2.2,1.2,.7][ALL[d.t].depth]||.5)
    .transition().duration(500)
    .attr('x1',d=>ALL[d.s].x).attr('y1',d=>ALL[d.s].y)
    .attr('x2',d=>ALL[d.t].x).attr('y2',d=>ALL[d.t].y)
    .attr('stroke-opacity',d=>[0,.5,.3,.18][ALL[d.t].depth]||.1);

  /* Nodes */
  ndSel=gNodes.selectAll('.ng').data(vis,d=>d.id);
  ndSel.exit().transition().duration(300).attr('opacity',0).remove();
  const ne=ndSel.enter().append('g').attr('class','nd-g ng').attr('opacity',0)
    .attr('transform',d=>{
      const p=d.pid!==null&&!ALL[d.pid]._hidden?ALL[d.pid]:d;
      return 'translate('+p.x+','+p.y+')';
    });

  // Root glow
  ne.filter(d=>d.depth===0).append('circle').attr('r',55).attr('fill','rgba(180,120,60,.06)').attr('stroke','rgba(180,120,60,.15)').attr('stroke-width',1);
  // Pulse rings
  ne.filter(d=>d.depth===1).append('circle').attr('class','pulse-ring').attr('r',24).attr('fill','none').attr('stroke',d=>(CAT[d.cat]||CAT.root).c).attr('stroke-width',1.5);
  ne.filter(d=>d.depth===2).append('circle').attr('class','pulse-ring').attr('r',15).attr('fill','none').attr('stroke',d=>(CAT[d.cat]||CAT.root).c).attr('stroke-width',1);
  // Main circle
  ne.append('circle').attr('class','nc')
    .attr('r',d=>NODE_R[Math.min(d.depth,3)])
    .attr('fill',d=>{const c=(CAT[d.cat]||CAT.root).c;return d.depth<=1?c:d.depth===2?c+'35':c+'20';})
    .attr('stroke',d=>(CAT[d.cat]||CAT.root).c)
    .attr('stroke-width',d=>[1.6,1.6,1.1,.5][d.depth]||.5)
    .attr('stroke-opacity',d=>[.95,.9,.6,.5][d.depth]||.4)
    .attr('filter',d=>d.depth===0?'url(#gf)':d.depth===1?'url(#gf2)':'none');
  // Badge
  ne.filter(d=>d.depth===1||d.depth===2).append('text').attr('class','nbadge').attr('text-anchor','middle')
    .attr('font-size',d=>d.depth===1?8:7).attr('font-weight',500)
    .attr('fill',d=>(CAT[d.cat]||CAT.root).c).attr('opacity',.5);
  // Label placeholder
  ne.append('text').attr('class','nl');

  ndSel=ne.merge(ndSel);

  // Update badges
  ndSel.select('.nbadge').attr('y',d=>d.depth===1?30:18).text(d=>{
    if(d.depth===1) return (expandedDomains.has(d.id)?'▾ ':'▸ ')+d.childIds.length+'개 분류';
    if(d.depth===2) return (expandedClasses.has(d.id)?'▾ ':'▸ ')+d.childIds.length+'개';
    return '';
  });
  // Update pulse
  ndSel.select('.pulse-ring').style('display',d=>{
    if(d.depth===1&&expandedDomains.has(d.id)) return 'none';
    if(d.depth===2&&expandedClasses.has(d.id)) return 'none';
    if(d.depth===1||d.depth===2) return null;
    return 'none';
  });

  // Events
  ndSel.on('click',(ev,d)=>{
    ev.stopPropagation();
    if(d.depth===1) toggleDomain(d.id);
    else if(d.depth===2) toggleClass(d.id);
    else showTT(ev,d);
  });
  ndSel.call(d3.drag()
    .on('start',(ev,d)=>{d.fx=d.x;d.fy=d.y;})
    .on('drag',(ev,d)=>{d.x=d.fx=ev.x;d.y=d.fy=ev.y;
      ndSel.attr('transform',n=>'translate('+n.x+','+n.y+')');
      updLinks();
    })
    .on('end',(ev,d)=>{d.fx=null;d.fy=null;}));

  // Animate
  ndSel.transition().duration(500).attr('opacity',1).attr('transform',d=>'translate('+d.x+','+d.y+')');
  setTimeout(renderLabels,120);
}

function updLinks(){
  gLinks.selectAll('.hl').attr('x1',function(){return ALL[d3.select(this).datum().s].x;})
    .attr('y1',function(){return ALL[d3.select(this).datum().s].y;})
    .attr('x2',function(){return ALL[d3.select(this).datum().t].x;})
    .attr('y2',function(){return ALL[d3.select(this).datum().t].y;});
}

/* ══════════════ TOGGLE ══════════════ */
function toggleDomain(did){
  if(expandedDomains.has(did)){
    expandedDomains.delete(did);
    ALL[did].childIds.forEach(c=>expandedClasses.delete(c));
  } else {
    expandedDomains.add(did);
    layoutClasses(did);
  }
  buildVis();
}
function toggleClass(cid){
  if(expandedClasses.has(cid)){
    expandedClasses.delete(cid);
  } else {
    // Collapse siblings
    ALL[ALL[cid].pid].childIds.forEach(s=>{if(s!==cid)expandedClasses.delete(s);});
    expandedClasses.add(cid);
    layoutTopics360(cid);
  }
  buildVis();
}
function expandAll(){
  ALL.filter(n=>n.depth===1).forEach(n=>expandedDomains.add(n.id));
  ALL.filter(n=>n.depth===2).forEach(n=>expandedClasses.add(n.id));
  layoutFullRadial();
  buildVis();
  setTimeout(fitView,300);
}
function collapseAll(){
  expandedDomains.clear(); expandedClasses.clear();
  layoutDomains(); buildVis(); setTimeout(fitView,300);
}

/* ══════════════ LABELS ══════════════ */
function renderLabels(){
  if(!ndSel) return;
  ndSel.select('.nl').each(function(d){
    const el=d3.select(this); el.selectAll('*').remove();
    let lx,ly,anchor;
    if(d.depth===0){lx=0;ly=0;anchor='middle';}
    else{
      const px=d.pid!==null?ALL[d.pid].x:0, py=d.pid!==null?ALL[d.pid].y:0;
      const a=Math.atan2(d.y-py,d.x-px);
      const base=NODE_R[Math.min(d.depth,3)]+(d.depth===3?5:8);
      lx=Math.cos(a)*base; ly=Math.sin(a)*base;
      anchor=Math.abs(a)>Math.PI/2?'end':'start';
    }
    const fs=[14,10.5,8.5,6.2][d.depth]||6;
    const fw=[700,700,600,400][d.depth]||400;
    const col=d.depth===0?'#3D2E22':d.depth===3?((CAT[d.cat]||CAT.root).c+'cc'):((CAT[d.cat]||CAT.root).c);
    el.attr('x',lx).attr('y',ly).attr('text-anchor',anchor).attr('dominant-baseline','central')
      .attr('font-size',fs).attr('font-weight',fw).attr('fill',col);
    const maxCh=[22,20,16,13][d.depth]||12;
    const words=d.lb.split(/\s+/); let lines=[],cur='';
    words.forEach(w=>{const t=cur?cur+' '+w:w;if(t.length>maxCh&&cur){lines.push(cur);cur=w;}else cur=t;});
    if(cur)lines.push(cur);
    if(lines.length===1)el.text(d.lb);
    else{el.text('');lines.forEach((ln,i)=>el.append('tspan').attr('x',lx).attr('dy',i===0?-(lines.length-1)*.5+'em':'1.08em').text(ln));}
  });
}

/* ══════════════ ZOOM ══════════════ */
const zb=d3.zoom().scaleExtent([.04,6]).on('zoom',ev=>gAll.attr('transform',ev.transform));
svg.call(zb);
function fitView(){
  const vis=ALL.filter(n=>!n._hidden);if(!vis.length)return;
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  vis.forEach(n=>{if(n.x<x0)x0=n.x;if(n.x>x1)x1=n.x;if(n.y<y0)y0=n.y;if(n.y>y1)y1=n.y;});
  const p=130,bw=x1-x0+p*2,bh=y1-y0+p*2,cx=(x0+x1)/2,cy=(y0+y1)/2;
  const s=Math.min(W/bw,H/bh)*.9;
  svg.transition().duration(700).call(zb.transform,d3.zoomIdentity.translate(W/2-cx*s,H/2-cy*s).scale(s));
}
function svgZoom(f){svg.transition().duration(300).call(zb.scaleBy,f);}

/* ══════════════ SEARCH ══════════════ */
function doSearch(q){
  const lq=(q||'').trim().toLowerCase();
  if(!lq){if(ndSel)ndSel.classed('sh',false).classed('dm',false);return;}
  let nb=false;
  ALL.filter(n=>n.depth===1).forEach(n=>{if(!expandedDomains.has(n.id)){expandedDomains.add(n.id);layoutClasses(n.id);nb=true;}});
  ALL.filter(n=>n.depth===2).forEach(n=>{if(!expandedClasses.has(n.id)){expandedClasses.add(n.id);layoutTopics360(n.id);nb=true;}});
  if(nb){layoutFullRadial();buildVis();}
  setTimeout(()=>{if(ndSel){ndSel.classed('sh',d=>d.lb.toLowerCase().includes(lq)).classed('dm',d=>!d.lb.toLowerCase().includes(lq));}},nb?500:0);
}
function clearSearch(){document.getElementById('si').value='';if(ndSel)ndSel.classed('sh',false).classed('dm',false);}

/* ══════════════ TOOLTIP ══════════════ */
function showTT(ev,d){
  const tt=document.getElementById('tt');
  document.getElementById('tt-h').textContent=d.lb;
  const cat=CAT[d.cat]||CAT.root;
  const tc=document.getElementById('tt-cat');
  tc.textContent=cat.label;tc.style.cssText='background:'+cat.c+'15;color:'+cat.c+';border:1px solid '+cat.c+'30';
  const path=[];let pid=d.pid;while(pid!==null&&pid!==undefined){path.unshift(ALL[pid].lb);pid=ALL[pid].pid;}
  document.getElementById('tt-path').textContent=path.join(' › ');
  document.getElementById('tt-desc').textContent=d.desc||(d.childIds.length?'하위 '+d.childIds.length+'개':'기출 토픽');
  tt.classList.add('show');
  tt.style.left=Math.min(ev.clientX+18,W-290)+'px';tt.style.top=Math.min(ev.clientY-8,H-120)+'px';
}
svg.on('click',()=>document.getElementById('tt').classList.remove('show'));

/* ══════════════ LEGEND ══════════════ */
const leg=document.getElementById('legend');
Object.entries(CAT).filter(([k])=>k!=='root').forEach(([,v])=>{
  const d=document.createElement('div');d.className='lg';
  d.innerHTML='<div class="lgd" style="background:'+v.c+'"></div>'+v.label;leg.appendChild(d);
});

/* ══════════════ INIT ══════════════ */
buildVis();
setTimeout(()=>{document.getElementById('loading').classList.add('hide');setTimeout(fitView,250);},600);
window.addEventListener('resize',()=>{svg.attr('width',window.innerWidth).attr('height',window.innerHeight);});
</script>
