<ul>
<li><strong>STP 프로세스:</strong><table>
<tr><th>단계</th><th>설명</th><th>핵심</th></tr>
<tr><td><strong>1. Segmentation(세분화)</strong></td><td>시장을 동질적 소비자 그룹으로 세분화</td><td>시장 구조 파악</td></tr>

<tr><td><strong>3. Positioning(구축)</strong></td><td>목표 시장에서 차별화된 브랜드 위치 구축</td><td>경쟁 우위 확보</td></tr>
