<h4>73. NFT 보안</h4>
<ul>
<li><strong>정의</strong>: NFT 마켓플레이스와 스마트 컨트랙트의 보안 취약점과 대응 방안</li>
<li><strong>키워드</strong>: 스마트 컨트랙트 취약점, 마켓플레이스 보안</li>
<li><strong>분류</strong>: 특수 보안</li>
<li><strong>주요 보안 위협</strong>: 스마트 컨트랙트 취약점 악용, 피싱을 통한 지갑 탈취, 가짜 NFT 민팅, 마켓플레이스 취약점</li>
<li><strong>인사이트</strong>: NFT 해킹의 대부분은 소셜 미디어 피싱이나 가짜 링크를 통한 지갑 서명 탈취로 발생하므로 사용자 교육이 핵심임</li>
</ul>
