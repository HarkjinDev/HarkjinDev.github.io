  <title>82. 지능형 CCTV 스마트관제</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내 여백 */
    body { margin: 0; padding: 20px 24px; box-sizing: border-box; }
    /* 이미지 반응형 */
    img { max-width: 100% !important; height: auto !important; }
    /* 테이블 스크롤 */

<body>
<h4>82. 지능형 CCTV 스마트관제</h4>
<ul>
<li><strong>정의</strong>: AI 영상분석으로 이상 행위를 자동 탐지하는 지능형 CCTV 관제 시스템</li>
<li><strong>키워드</strong>: AI 영상분석, 이상행위 탐지, 자동 관제</li>
<li><strong>분류</strong>: 특수 보안</li>
<li><strong>주요 기능</strong>: 객체 인식(사람·차량), 행동 분석(침입·낙상·방치물), 군중 밀집 탐지, 실시간 경보</li>
<li><strong>인사이트</strong>: 지능형 CCTV는 관제 인력 부족을 보완하는 효과적 기술이나, 개인정보보호법상 고지 의무와 영상 보존 기간 준수가 필수임</li>
</ul>
