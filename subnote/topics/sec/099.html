    /* iframe 내 여백 */

<h4>72. 블록체인 스마트 컨트랙트 보안</h4>
<ul>
<li><strong>정의</strong>: 스마트 컨트랙트의 보안 취약점과 감사(Audit) 기법</li>
<li><strong>키워드</strong>: Audit, 소스코드 취약점, 해킹 방지</li>
<li><strong>분류</strong>: 특수 보안</li>
<li><strong>주요 취약점</strong>: 재진입 공격(Reentrancy), 정수 오버플로우/언더플로우, 타임스탬프 의존성, 접근 제어 미비</li>
<li><strong>인사이트</strong>: 스마트 컨트랙트는 배포 후 수정이 어려우므로, 배포 전 철저한 감사와 버그 바운티가 필수임</li>
</ul>

</body>
