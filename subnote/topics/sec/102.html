<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>75. 메타버스 보안</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내 여백 */
    body { margin: 0; padding: 20px 24px; box-sizing: border-box; }
    /* 이미지 반응형 */
    img { max-width: 100% !important; height: auto !important; }
    /* 테이블 스크롤 */
    table { display: block; overflow-x: auto; max-width: 100%; }
  </style>
</head>
<body>
<h4>75. 메타버스 보안</h4>
<ul>
<li><strong>정의</strong>: 메타버스 환경에서 발생 가능한 보안 위협과 대응 방안</li>
<li><strong>키워드</strong>: 아바타 도용, 가상자산 탈취, 프라이버시</li>
<li><strong>분류</strong>: 특수 보안</li>
<li><strong>주요 보안 위협</strong>: 아바타 신원 도용, 가상자산 해킹, VR 기기 물리적 해킹, 딥페이크 아바타, 사용자 행동 데이터 수집</li>
<li><strong>인사이트</strong>: 메타버스는 물리적 세계의 경험을 디지털화하므로, 기존 사이버 공격보다 심리적 피해가 크고 법적 보호 체계가 미비한 새로운 보안 영역임</li>
</ul>

</body>
</html>
