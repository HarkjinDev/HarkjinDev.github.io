<ul>
<li><strong>정의</strong>: 개인정보 보호를 위한 조직의 내부 관리 정책과 절차 문서</li>
<li><strong>키워드</strong>: 개보법 제29조, 안전성 확보조치 고시 제4조</li>

<li><strong>포함 사항</strong>: 개인정보보호책임자 지정, 접근권한 관리, 암호화, 접속기록 관리, 보안프로그램, 물리적 안전조치, 교육계획</li>
<li><strong>인사이트</strong>: 내부관리계획은 서면으로 작성하여 보관해야 하며, 연 1회 이상 검토·갱신이 권장됨</li>
