  <title>11. 마이데이터 전송 보안</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내 여백 */
    body { margin: 0; padding: 20px 24px; box-sizing: border-box; }

<body>
<h4>11. 마이데이터 전송 보안</h4>
<ul>
<li><strong>정의</strong>: 마이데이터 전송 시 개인정보의 안전한 처리를 보장하는 보안 가이드</li>
<li><strong>키워드</strong>: 전송 암호화, 접근 관리, 재해 대비</li>
<li><strong>분류</strong>: 개인정보보호</li>
<li><strong>주요 보안 요건</strong>: TLS 1.2 이상 암호화, API 토큰 기반 인증, 접근 로그 관리, 재해 대비 복구 계획</li>
<li><strong>인사이트</strong>: 마이데이터 서비스는 대규모 개인정보가 집중되는 구조로 고위험 목표가 되므로, API 보안·토큰 관리·전송 암호화의 3중 보안이 필수임</li>
</ul>

</body>
