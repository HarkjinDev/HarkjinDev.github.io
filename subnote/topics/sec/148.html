<h4>13. 자동화 의사결정 대응권</h4>
<ul>
<li><strong>정의</strong>: AI 자동화 의사결정에 대해 설명을 요구하고 거부할 수 있는 정보주체의 권리</li>
<li><strong>키워드</strong>: AI 의사결정, 설명 요구, 거부권</li>
<li><strong>분류</strong>: 개인정보보호</li>
<li><strong>법적 근거</strong>: 개인정보보호법 제37조의2 (2023년 개정)</li>
<li><strong>권리 내용</strong>: 설명 요구권, 이의 제기권, 인간 재검토 요구권</li>
<li><strong>인사이트</strong>: 자동화 의사결정 대응권은 EU GDPR Article 22의 '프로파일링 거부권'에 해당하는 권리로, AI 기반 금융·신용·채용 결정에서 특히 중요함</li>
</ul>
