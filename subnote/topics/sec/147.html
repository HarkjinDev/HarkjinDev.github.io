<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12. 개인정보 전송요구권</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내부 여백 및 반응형 보정 */
    body { margin: 0; padding: 20px 24px 40px; box-sizing: border-box; }
    img  { max-width: 100% !important; height: auto !important; }
    /* table display:block 금지 — style.css 값 덮어쓰기 방지 */
    table { display: table !important; width: max-content; min-width: 100%; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
<h4>12. 개인정보 전송요구권</h4>
<ul>
<li><strong>정의</strong>: 정보주체가 자신의 개인정보를 보유 기관에서 다른 기관으로 전송 요구할 수 있는 권리</li>
<li><strong>키워드</strong>: 데이터 이동권, 본인 정보 전송 요구</li>
<li><strong>분류</strong>: 개인정보보호</li>
<li><strong>법적 근거</strong>: 개인정보보호법 제35조의2 (2023년 개정)</li>
<li><strong>EU GDPR Article 20 '데이터 이동권'과 유사</strong></li>
<li><strong>인사이트</strong>: 전송요구권은 금융 마이데이터를 시작으로 의료·공공·전자상거래로 확대되며, 데이터 경제의 핵심 인프라로 발전 중임</li>
</ul>

</body>
</html>
