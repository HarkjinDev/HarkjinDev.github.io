<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3. AI 모델 테스트 기법 (소프트웨어 테스트의 확장)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내부 여백 및 반응형 보정 */
    body { margin: 0; padding: 20px 24px 40px; box-sizing: border-box; }
    img  { max-width: 100% !important; height: auto !important; }
    /* table display:block 금지 — style.css 값 덮어쓰기 방지 */
    table { display: table !important; width: 100%; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
<h4>3. AI 모델 테스트 기법 (소프트웨어 테스트의 확장)</h4>
<ul>
<li><strong>정의</strong>: 결정론적이지 않은 AI 모델의 특성을 고려하여, 모델의 <span style="background:#fbe4e4;border-radius:3px;padding:1px 3px"><u><strong>강건성(Robustness)과 안전성</strong></u></span>을 검증하기 위한 특화된 테스팅 기법</li>
<li><strong>키워드</strong>: 테스트 오라클, 화이트박스 테스팅, 강건성 검증, 적대적 공격(Adversarial Attack)</li>
<li><strong>분류</strong>: 성능평가/테스트</li>
<li><strong>인사이트</strong>: AI 모델은 전통적 SW와 달리 모든 경로를 예측하기 어려우므로, 통계적 검증과 적대적 사례(Edge Case) 테스트 병행이 필수적임</li>
</ul>

</body>
</html>
