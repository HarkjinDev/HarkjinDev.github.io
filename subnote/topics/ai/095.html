  <title>[하위] 1-1. 인공지능신뢰성(Trustworthiness)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내부 여백 및 반응형 보정 */
    body { margin: 0; padding: 20px 24px 40px; box-sizing: border-box; }
    img  { max-width: 100% !important; height: auto !important; }
    /* table display:block 금지 — style.css 값 덮어쓰기 방지 */

    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

<h4>[하위] 1-1. 인공지능 <strong>신뢰성(Trustworthiness)</strong></h4>
<ul>
<li><strong>신뢰성 속성:</strong><table>
<tr><th><strong>핵심 속성</strong></th><th><strong>설명</strong></th><th><strong>핵심</strong></th></tr>
<tr><td><strong>안전성</strong></td><td>인명과 환경에 대한 위험 요소 제거</td><td><strong>위해 방지</strong></td></tr>
<tr><td><strong>설명가능성</strong></td><td>AI 판단 근거와 과정의 이해 제공</td><td><strong>근거 제시</strong></td></tr>
<tr><td><strong>투명성</strong></td><td>정보 공개 및 결정 근거 추적 가능</td><td><strong>정보 공개</strong></td></tr>
<tr><td><strong>견고성</strong></td><td>외부 간섭 및 극한 환경 내 성능 유지</td><td><strong>안정 유지</strong></td></tr>
<tr><td><strong>공정성</strong></td><td>특정 그룹 차별 및 편향성 배제</td><td><strong>차별 금지</strong></td></tr>
</table>
</li>
</ul>

</body>
