<h4>[하위] 4-2. Wait-Die, Wound-Wait</h4>
<ul>
<li><strong>교창상태 회피 원리: </strong><div class="table-scroll"><table>
<tr><th><strong>구분</strong></th><th><strong>Wait-Die (비선점)</strong></th><th><strong>Wound-Wait (선점)</strong></th></tr>
<tr><td><strong>고참 → 신참 자원 요청</strong></td><td><strong>Wait</strong>: 고참 트랜잭션이 대기함</td><td><strong>Wound</strong>: 고참이 신참을 선점(신참 복귀)</td></tr>
<tr><td><strong>신참 → 고참 자원 요청</strong></td><td><strong>Die</strong>: 신참 트랜잭션이 종료됨</td><td><strong>Wait</strong>: 신참 트랜잭션이 대기함</td></tr>
<tr><td><strong>핵심 원리</strong></td><td>신참 트랜잭션을 희생시켜 교착 방지</td><td>고참 트랜잭션에 우선순위 및 선점권 부여</td></tr>
</table></div>
</li>
</ul>
