<h4>7. 정보시스템 운영 성과측정 메뉴얼(25.11.)</h4>
<ul>
<li><strong>정의</strong>: 정보시스템 운영의 효율성과 효과성 평가하여 운영 타당성을 판단, 체계적관리 활동</li>
<li><strong>키워드</strong>: 전자정부법 68조, 1차-2차 측정, 운영관점, 업무관점, 유지, 기능고도화, 재개발, 통폐합, 폐기</li>
<li><strong>분류</strong>: 가이드</li>
<li><strong>법적근거: </strong><span style="background:#fbe4e4;border-radius:3px;padding:1px 3px"><u><strong>전자정부법 제 68조</strong></u></span>, 전자정부평가지침(행안부고시 제2024-19호)</li>
<li><strong>대상: </strong>서비스 운영이 개시된 시점으로부터 <span style="background:#fbe4e4;border-radius:3px;padding:1px 3px"><u><strong>5년 경과한 정보시스템</strong></u></span></li>
<li><strong>성과측정 및 평가: </strong><span style="background:#ddebf1;border-radius:3px;padding:1px 3px"><strong>&lt;운유비/기업공고&gt;</strong></span></li>
</ul>
