<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[하위] 1-4. BCNF/4NF/5NF 예제</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내부 여백 및 반응형 보정 */
    body { margin: 0; padding: 20px 24px 40px; box-sizing: border-box; }
    img  { max-width: 100% !important; height: auto !important; }
    /* table display:block 금지 — style.css 값 덮어쓰기 방지 */
    table { display: table !important; width: 100%; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
<h4>[하위] 1-4. BCNF/4NF/5NF 예제</h4>
<ul>
<li><strong>교수 예제로 보는 정규화 단계 흐름</strong><table>
<tr><th>단계</th><th>예제 테이블</th><th>문제</th><th>분해 결과</th></tr>
<tr><td><strong>BCNF</strong></td><td>학생-과목-교수</td><td>교수명이 후보키 아닌 결정자</td><td>교수-과목 + 학생-교수</td></tr>
<tr><td><strong>4NF</strong></td><td>교수-과목-교재</td><td>과목·교재 독립 다치 종속</td><td>교수-과목 + 교수-교재</td></tr>
<tr><td><strong>5NF</strong></td><td>교수-학생-과목</td><td>3자 순환 조인 종속</td><td>교수-학생 + 학생-과목 + 교수-과목</td></tr>
</table>
</li>
</ul>

</body>
