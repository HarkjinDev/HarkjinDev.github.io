<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7. 다변량회귀분석 (Multivariate Regression Analysis)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* iframe 내부 여백 및 반응형 보정 */
    body { margin: 0; padding: 20px 24px 40px; box-sizing: border-box; }
    img  { max-width: 100% !important; height: auto !important; }
    /* table display:block 금지 — style.css 값 덮어쓰기 방지 */
    table { display: table !important; width: max-content; min-width: 100%; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
<h4>7. 다변량회귀분석 (Multivariate Regression Analysis)</h4>
<ul>
<li><strong>정의</strong>: 복수의 종속변수를 동시에 예측하는 다차원 회귀 분석 기법</li>
<li><strong>키워드</strong>: 종속변수 2개 이상, MANOVA, 정준상관분석</li>
<li><strong>분류</strong>: 회귀분석</li>
<li><strong>비교</strong> (다중회귀 vs 다변량회귀):<div class="table-scroll"><table>
<tr><th>구분</th><th>다중회귀</th><th>다변량회귀</th></tr>
<tr><td><strong>독립변수</strong></td><td>2개 이상</td><td>2개 이상</td></tr>
<tr><td><strong>종속변수</strong></td><td>1개</td><td>2개 이상</td></tr>
<tr><td><strong>활용</strong></td><td>예측/설명</td><td>복수 결과 동시 분석</td></tr>
</table></div>
</li>
<li><strong>인사이트</strong>: 다변량회귀는 종속변수 간 상관관계를 고려하여 개별 분석보다 통계적 효율성이 높다.</li>
</ul>

</body>
</html>
