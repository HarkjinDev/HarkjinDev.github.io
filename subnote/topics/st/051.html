<h4>1. 데이터 마이닝 (Data Mining)</h4>
<ul>
<li><strong>정의</strong>: 대규모 데이터에서 유용한 패턴과 지식을 자동 추출하는 분석 기법</li>
<li><strong>키워드</strong>: 패턴 인식, 지식 추출, KDD(지식발견 프로세스), 군집, 분류, 연관</li>
<li><strong>분류</strong>: 데이터 마이닝</li>
<li><strong>통계와 차이</strong>:<div class="table-scroll"><table>
<tr><th>구분</th><th>통계</th><th>데이터 마이닝</th></tr>
<tr><td><strong>목적</strong></td><td>가설 검증</td><td>패턴/지식 발견</td></tr>
<tr><td><strong>데이터</strong></td><td>정형</td><td>정형+비정형</td></tr>
<tr><td><strong>접근</strong></td><td>모수 추정</td><td>자동 학습·탐색</td></tr>
</table></div>
</li>
<li><strong>인사이트</strong>: 가설 없이 대규모 데이터에서 자동으로 유용한 패턴 추출이 핵심. 통계는 가설 검증, 데이터 마이닝은 탐색적 발견이 목적이다.</li>
</ul>

</body>
