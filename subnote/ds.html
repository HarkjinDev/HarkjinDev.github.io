body { background: rgb(255, 255, 255); }

body.dark { background: rgb(25, 25, 25); }

@keyframes startup-shimmer-animation { 
  0% { transform: translateX(-100%) translateZ(0px); }
  100% { transform: translateX(100%) translateZ(0px); }
}

@keyframes startup-shimmer-fade-in { 
  0% { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes startup-spinner-rotate { 
  0% { transform: rotate(0deg) translateZ(0px); }
  100% { transform: rotate(360deg) translateZ(0px); }
}

#initial-loading-spinner { position: fixed; height: 100vh; width: 100vw; z-index: -1; display: none; align-items: center; justify-content: center; }

#initial-loading-spinner .spinner { position: relative; display: inline-block; height: 22px; width: 22px; pointer-events: none; }

#initial-loading-spinner .spinner__circle { position: absolute; top: 0px; left: 0px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(28, 19, 1, 0.11); }

.dark #initial-loading-spinner .spinner__circle { border-color: rgba(255, 255, 235, 0.1); }

#initial-loading-spinner .spinner__arc { position: absolute; top: 0px; left: 0px; width: 22px; height: 22px; border-radius: 50%; border-width: 2px; border-style: solid; border-color: rgb(56, 56, 54) rgb(56, 56, 54) transparent transparent; mask: linear-gradient(90deg, transparent 66.66%, rgb(0, 0, 0) 66.66%); animation: 1.2s linear 0s infinite normal none running startup-spinner-rotate; }

.dark #initial-loading-spinner .spinner__arc { border-color: rgb(240, 239, 237); }

#skeleton { background: rgb(255, 255, 255); position: fixed; height: 100vh; width: 100vw; z-index: -1; display: none; overflow: hidden; }

#initial-loading-spinner.show, #skeleton.show { display: flex; }

body.dark #skeleton { background: rgb(25, 25, 25); }

.notion-front-page #skeleton, .notion-mobile #skeleton { display: none; }

#skeleton-sidebar { background-color: rgb(249, 248, 247); box-shadow: inset calc(var(--direction,1) * -1px) 0 0 0 #f0efed; display: flex; width: 240px; flex-direction: column; padding: 12px 14px; overflow: hidden; }

body.dark #skeleton-sidebar { background-color: rgb(32, 32, 32); box-shadow: inset calc(var(--direction,1) * -1px) 0 0 0 #2c2c2b; }

#skeleton.isElectron #skeleton-sidebar { padding-top: 46px; }

#skeleton .row { display: flex; margin-bottom: 11px; align-items: center; }

#skeleton .row.fadein { animation: 1s ease-in 0s 1 normal both running startup-shimmer-fade-in; }

#skeleton .chevron { width: 12px; height: 12px; display: block; margin-right: 4px; fill: rgba(227, 226, 224, 0.5); }

body.dark #skeleton .chevron { fill: rgb(47, 47, 47); }

.startup-shimmer { background: rgba(227, 226, 224, 0.5); overflow: hidden; position: relative; }

body.dark .startup-shimmer { background: rgb(47, 47, 47); }

.startup-shimmer::before { content: ""; position: absolute; height: 100%; width: 100%; z-index: 1; animation: 1s linear 0s infinite normal none running startup-shimmer-animation; background: linear-gradient(90deg, rgba(0, 0, 0, 0) 0px, rgba(0, 0, 0, 0.03) 50%, rgba(0, 0, 0, 0) 100%); }

body.dark .startup-shimmer::before { background: linear-gradient(90deg, transparent 0px, rgba(86, 86, 86, 0.1) 50%, transparent 100%); }

#skeleton .icon { width: 20px; height: 20px; border-radius: 4px; }

#skeleton .text { height: 10px; border-radius: 10px; }

#skeleton .draggable { app-region: drag; position: absolute; top: 0px; left: 0px; width: 100%; height: 36px; display: none; }

#skeleton.isElectron .draggable { display: block; }
