<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서브노트 뷰어</title>
  <style>
    :root {
      --bg:          #f5f4ef;
      --sidebar-bg:  #1e202b;
      --sidebar-w:   264px;
      --header-h:    52px;
      --text:        #37352f;
      --muted:       #9a9692;
      --border:      #e6e3dc;
      --accent:      #c17550;
      --active-bg:   #353849;
      --active-text: #a8c5ff;
      --hover:       #272a38;
      --domain-bg:   #262934;
      --tag-bg:      #373d52;
      --tag-text:    #9fb3ff;
      --content-bg:  #ffffff;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
    }

    /* ── 헤더 ─────────────────────────────── */
    header {
      height: var(--header-h);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .logo {
      font-size: .93rem;
      font-weight: 700;
      color: #e0ddd6;
      letter-spacing: -.01em;
    }
    .logo em { color: var(--accent); font-style: normal; }

    .btn-menu {
      display: none;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 5px 7px;
      font-size: 1rem;
      border-radius: 5px;
      line-height: 1;
    }
    .btn-menu:hover { background: rgba(255,255,255,.08); color: #ccc; }

    .breadcrumb {
      margin-left: auto;
      font-size: .75rem;
      color: #888;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      padding: 4px 12px;
      border-radius: 20px;
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── 레이아웃 ──────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── 사이드바 ──────────────────────────── */
    aside {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      overflow-y: auto;
      overflow-x: hidden;
    }
    aside::-webkit-scrollbar { width: 3px; }
    aside::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    .domain-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 14px;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,.03);
      cursor: pointer;
      text-align: left;
      color: #b0ab9f;
      font-family: var(--font);
      font-size: .8rem;
      transition: background .12s;
    }
    .domain-btn:hover { background: var(--hover); }
    .domain-btn.open  { background: var(--domain-bg); }

    .domain-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: .67rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
      flex-shrink: 0;
      letter-spacing: .03em;
    }
    .domain-name { flex: 1; font-size: .79rem; }
    .domain-arrow {
      font-size: .58rem;
      color: #4a4f5e;
      flex-shrink: 0;
      transition: transform .2s;
    }
    .domain-btn.open .domain-arrow { transform: rotate(90deg); color: #666; }

    .topic-list { display: none; list-style: none; padding: 2px 0 4px; }
    .topic-list.open { display: block; }

    .topic-item {
      display: block;
      padding: 5px 14px 5px 34px;
      cursor: pointer;
      color: #747068;
      font-size: .76rem;
      line-height: 1.5;
      transition: background .1s, color .1s;
      user-select: none;
    }
    .topic-item:hover { background: var(--hover); color: #bdb7ae; }
    .topic-item.active { background: var(--active-bg); color: var(--active-text); font-weight: 500; }

    /* ── 메인 (스크롤 컨테이너) ──────────────
       main이 직접 스크롤 → iframe 내부 스크롤 없음
       → 모바일에서 하단까지 정상 스크롤 보장 */
    main {
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;  /* iOS 부드러운 스크롤 */
      background: var(--bg);
    }

    /* 콘텐츠 너비 제한 (노션 뷰와 유사) */
    .content-wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── 플레이스홀더 ─────────────────────── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      color: var(--muted);
      gap: 12px;
    }
    .placeholder-icon { font-size: 2.8rem; opacity: .3; }
    .placeholder-text { font-size: .88rem; }

    /* ── 로딩 ───────────────────────────────── */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
    }
    .loading.show { display: flex; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── iframe ─────────────────────────────
       scrolling="no" + 높이 동적 계산
       → main이 스크롤, iframe 자체는 스크롤 없음 */
    iframe#viewer {
      width: 100%;
      border: none;
      display: none;
      background: var(--content-bg);
      /* 상단 구분선 */
      border-top: 1px solid var(--border);
    }
    iframe#viewer.show { display: block; }

    /* ── 오버레이 (모바일) ──────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      top: var(--header-h);
      background: rgba(0,0,0,.45);
      z-index: 99;
    }
    .overlay.show { display: block; }

    /* ── 모바일 ─────────────────────────────── */
    @media (max-width: 680px) {
      :root { --sidebar-w: 240px; }
      .btn-menu   { display: block; }
      .breadcrumb { max-width: 150px; }

      aside {
        position: fixed;
        top: var(--header-h);
        left: 0;
        bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform .25s ease;
        box-shadow: 4px 0 28px rgba(0,0,0,.4);
      }
      aside.open { transform: translateX(0); }

      .content-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <button class="btn-menu" id="btnMenu" title="메뉴">☰</button>
  <div class="logo">📚 <em>서브노트</em></div>
  <div class="breadcrumb" id="breadcrumb">토픽을 선택하세요</div>
</header>

<div class="layout">
  <aside id="sidebar">
    <nav id="nav">
      <div style="padding:20px 14px;color:#444;font-size:.76rem;">불러오는 중…</div>
    </nav>
  </aside>

  <div class="overlay" id="overlay"></div>

  <main id="mainEl">
    <div class="content-wrap">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">📖</div>
        <div class="placeholder-text">좌측에서 토픽을 선택하세요</div>
      </div>
      <div class="loading" id="loading"><div class="spinner"></div></div>
      <iframe id="viewer" title="토픽 뷰어" scrolling="no"></iframe>
    </div>
  </main>
</div>

<script>
const nav        = document.getElementById('nav');
const viewer     = document.getElementById('viewer');
const placeholder = document.getElementById('placeholder');
const loading    = document.getElementById('loading');
const breadcrumb = document.getElementById('breadcrumb');
const sidebar    = document.getElementById('sidebar');
const overlay    = document.getElementById('overlay');
const btnMenu    = document.getElementById('btnMenu');
const mainEl     = document.getElementById('mainEl');

let activeItem = null;

/* ── 사이드바 토글 (모바일) ── */
btnMenu.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', closeSidebar);
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

/* ── iframe 높이를 콘텐츠에 맞게 조정 ──
   iframe 자체는 스크롤 없음 → main이 스크롤 처리
   모바일 하단 스크롤 문제 해결 */
function resizeIframe() {
  try {
    const doc = viewer.contentDocument || viewer.contentWindow.document;
    const h   = doc.documentElement.scrollHeight || doc.body.scrollHeight;
    if (h > 0) viewer.style.height = h + 'px';
  } catch (e) {
    viewer.style.height = '80vh';
  }
}

/* ── topics.json 로드 ── */
async function init() {
  try {
    const res  = await fetch('topics.json');
    if (!res.ok) throw new Error('topics.json 없음');
    const data = await res.json();
    renderNav(data);

    const hash = location.hash.slice(1);
    if (hash) {
      const [domain, id] = hash.split('/');
      if (domain && id && data[domain]) {
        const t = data[domain].topics.find(t => t.id === id);
        if (t) loadTopic(domain, id, t.name, data[domain].label, true);
      }
    }
  } catch (e) {
    nav.innerHTML = `<div style="padding:14px;color:#f87;font-size:.76rem;">⚠ 로드 실패: ${e.message}</div>`;
  }
}

/* ── 네비게이션 렌더링 ── */
function renderNav(data) {
  nav.innerHTML = '';
  Object.entries(data).forEach(([fname, info]) => {
    const btn = document.createElement('button');
    btn.className = 'domain-btn';
    btn.innerHTML = `
      <span class="domain-tag">${info.label}</span>
      <span class="domain-name">${info.desc}</span>
      <span class="domain-arrow">▶</span>`;

    const ul = document.createElement('ul');
    ul.className = 'topic-list';

    info.topics.forEach(topic => {
      const li = document.createElement('li');
      li.className   = 'topic-item';
      li.textContent = topic.name;
      li.dataset.domain = fname;
      li.dataset.id     = topic.id;
      li.addEventListener('click', () => {
        loadTopic(fname, topic.id, topic.name, info.label, false);
        closeSidebar();
      });
      ul.appendChild(li);
    });

    btn.addEventListener('click', () => {
      const isOpen = btn.classList.contains('open');
      document.querySelectorAll('.domain-btn.open').forEach(b => {
        b.classList.remove('open');
        b.nextElementSibling?.classList.remove('open');
      });
      if (!isOpen) { btn.classList.add('open'); ul.classList.add('open'); }
    });

    nav.appendChild(btn);
    nav.appendChild(ul);
  });
}

/* ── 토픽 로드 ── */
function loadTopic(domain, id, name, label, skipOpen) {
  if (activeItem) activeItem.classList.remove('active');
  const item = nav.querySelector(`.topic-item[data-domain="${domain}"][data-id="${id}"]`);
  if (item) {
    item.classList.add('active');
    activeItem = item;
    if (!skipOpen) {
      const ul  = item.closest('.topic-list');
      const btn = ul?.previousElementSibling;
      if (ul && btn) {
        document.querySelectorAll('.domain-btn.open').forEach(b => {
          b.classList.remove('open');
          b.nextElementSibling?.classList.remove('open');
        });
        btn.classList.add('open');
        ul.classList.add('open');
      }
    }
    item.scrollIntoView({ block: 'nearest' });
  }

  breadcrumb.textContent = `${label} / ${name}`;
  history.replaceState(null, '', `#${domain}/${id}`);

  // 상태 초기화
  placeholder.style.display = 'none';
  viewer.classList.remove('show');
  viewer.style.height = 'auto';
  loading.classList.add('show');

  viewer.onload = () => {
    loading.classList.remove('show');
    // RAF으로 레이아웃 완료 후 높이 계산
    requestAnimationFrame(() => {
      resizeIframe();
      viewer.classList.add('show');
      mainEl.scrollTo({ top: 0 });
    });
  };
  viewer.src = `topics/${domain}/${id}.html`;
}

init();
</script>
</body>
</html>
