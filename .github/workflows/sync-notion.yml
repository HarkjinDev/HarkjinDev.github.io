name: Sync Notion Subnotes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'   # 매일 KST 00:00

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # ────────────────────────────────────────
      # 1. 체크아웃
      # ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────
      # 2. Python 설치 및 의존성
      # ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # ────────────────────────────────────────
      # 3. Notion API → HTML 변환
      # ────────────────────────────────────────
      - name: Convert Notion pages to HTML
        env:
          NOTION_INTEGRATION_TOKEN: ${{ secrets.NOTION_INTEGRATION_TOKEN }}
        run: python3 scripts/notion_to_html.py

      # ────────────────────────────────────────
      # 4. 토픽 분할
      # ────────────────────────────────────────
      - name: Split into topics
        run: |
          mkdir -p subnote/topics
          for name in db ai sec nw sw al st caos bizpm ds gr; do
            html="subnote/${name}.html"
            if [ -f "$html" ] && [ $(wc -c < "$html") -gt 10000 ]; then
              rm -rf "subnote/topics/${name}/"
            fi
          done
          python3 scripts/gen_topics.py

      # ────────────────────────────────────────
      # 5. mem.html 생성
      # ────────────────────────────────────────
      - name: Generate mem.html
        run: python3 scripts/gen_mem.py

      # ────────────────────────────────────────
      # 6. index.html 생성
      # ────────────────────────────────────────
      - name: Generate index.html
        run: |
          python3 << 'EOF'
          from datetime import datetime, timezone, timedelta
          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST).strftime("%Y-%m-%d %H:%M KST")
          pages = [
              ("db","DB","데이터베이스"),("ai","AI","인공지능"),
              ("sec","SEC","정보보안"),("nw","NW","네트워크"),
              ("sw","SW","소프트웨어공학"),("al","AL","알고리즘"),
              ("st","ST","통계/수학"),("caos","CA/OS","컴퓨터구조/운영체제"),
              ("bizpm","BIZ/PM","경영/프로젝트관리"),("ds","DS","디지털서비스"),
              ("gr","GR","가이드/법제도/표준"),
          ]
          items = """
                <li><a href="mem.html">
                  <span class="label" style="background:#d44c47;color:#fff">📝 두음</span>
                  <span class="desc">전 도메인 두음 모음</span></a></li>
                <li><a href="viewer.html">
                  <span class="label" style="background:#4a7dff;color:#fff">📖 뷰어</span>
                  <span class="desc">토픽 분할 뷰어</span></a></li>"""
          for f,l,d in pages:
              items += f"""
                <li><a href="{f}.html">
                  <span class="label">{l}</span>
                  <span class="desc">{d}</span></a></li>"""
          html = f"""<!DOCTYPE html>
          <html lang="ko"><head>
            <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
            <title>서브노트 목록</title>
            <style>
              body{{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
                max-width:640px;margin:60px auto;padding:0 20px;color:#333}}
              h1{{font-size:1.6rem;margin-bottom:8px}}
              .updated{{color:#999;font-size:.85rem;margin-bottom:32px}}
              ul{{list-style:none;padding:0}}li{{margin-bottom:12px}}
              a{{display:flex;align-items:center;gap:12px;padding:14px 18px;
                border:1px solid #e5e5e5;border-radius:8px;text-decoration:none;color:inherit;transition:background .15s}}
              a:hover{{background:#f7f7f7}}
              .label{{font-weight:600;font-size:1rem;min-width:64px;
                background:#2d3748;color:#fff;padding:3px 10px;border-radius:4px}}
              .desc{{color:#666;font-size:.9rem}}
            </style>
          </head><body>
            <h1>📚 서브노트</h1>
            <p class="updated">마지막 업데이트: {now}</p>
            <ul>{items}</ul>
          </body></html>"""
          open("subnote/index.html","w",encoding="utf-8").write(html)
          print("[완료] subnote/index.html")
          EOF

      # ────────────────────────────────────────
      # 7. Git commit & push
      # ────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subnote/
          if git diff --cached --quiet; then
            echo "[INFO] 변경 없음"
          else
            git commit -m "chore: sync notion subnotes [$(TZ=Asia/Seoul date +'%Y-%m-%d')]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
