name: Sync Notion Subnotes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'   # 매일 KST 00:00 (UTC 15:00)

# ══════════════════════════════════════════════════
# Job 1: 각 페이지 병렬 캡처
# ══════════════════════════════════════════════════
jobs:
  capture:
    strategy:
      fail-fast: false      # 1개 실패해도 나머지 계속 실행
      matrix:
        include:
          - {name: db,    url: "https://salt-stetson-a0e.notion.site/DB-3336968f52c480d4be00c83639a5ee64"}
          - {name: ai,    url: "https://salt-stetson-a0e.notion.site/AI-32d6968f52c480649b2ef0be961c3a7c"}
          - {name: sec,   url: "https://salt-stetson-a0e.notion.site/SEC-3396968f52c4817e8ecbdac791ad2d56"}
          - {name: nw,    url: "https://salt-stetson-a0e.notion.site/NW-3466968f52c480619afeecdbcf66c206"}
          - {name: sw,    url: "https://salt-stetson-a0e.notion.site/SW-3466968f52c480fc9adaf62344b29fa8"}
          - {name: al,    url: "https://salt-stetson-a0e.notion.site/AL-3466968f52c480b0a414c596c619b340"}
          - {name: st,    url: "https://salt-stetson-a0e.notion.site/ST-3436968f52c481af8f10f58df4f3a7c5"}
          - {name: caos,  url: "https://salt-stetson-a0e.notion.site/CA-OS-3416968f52c480189650ed73a0c41e7d"}
          - {name: bizpm, url: "https://salt-stetson-a0e.notion.site/BIZ-PM-3466968f52c48024a060e2173bd72c24"}
          - {name: ds,    url: "https://salt-stetson-a0e.notion.site/DS-3466968f52c48061a7cdfaafe8009fba"}
          - {name: gr,    url: "https://salt-stetson-a0e.notion.site/3536968f52c480b79401dcaefe521c71"}

    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Capture MHTML - ${{ matrix.name }}
        run: |
          python3 << 'EOF'
          import asyncio
          import sys
          from playwright.async_api import async_playwright

          NAME       = "${{ matrix.name }}"
          URL        = "${{ matrix.url }}"
          MIN_SIZE   = 100   # KB
          MIN_CSS    = 7
          MAX_RETRY  = 3

          CONTENT_SELECTOR = (
              "table, "
              "[data-block-id], "
              "[class*='notion-page-content'], "
              "[class*='notion-text-block'], "
              ".notion-selectable"
          )

          async def capture():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=True,
                      args=["--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu"]
                  )
                  try:
                      context = await browser.new_context(
                          user_agent=(
                              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                              "AppleWebKit/537.36 (KHTML, like Gecko) "
                              "Chrome/124.0.0.0 Safari/537.36"
                          ),
                          locale="ko-KR",
                          timezone_id="Asia/Seoul",
                          extra_http_headers={
                              "Accept-Language": "ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7",
                          }
                      )
                      page = await context.new_page()
                      cdp  = await context.new_cdp_session(page)
                      await cdp.send("Network.enable")

                      await page.goto(URL, wait_until="domcontentloaded", timeout=90000)

                      try:
                          await page.wait_for_selector(CONTENT_SELECTOR, timeout=60000)
                          print(f"[INFO] {NAME} - 콘텐츠 감지 완료")
                      except Exception:
                          print(f"[WARN] {NAME} - 콘텐츠 미감지, 20초 추가 대기")
                          await asyncio.sleep(20)

                      await asyncio.sleep(3)

                      # lazy-load 유발 스크롤
                      await page.evaluate("""
                          async () => {
                              await new Promise(resolve => {
                                  let total = 0;
                                  const dist = 800;
                                  const t = setInterval(() => {
                                      window.scrollBy(0, dist);
                                      total += dist;
                                      if (total >= document.body.scrollHeight) {
                                          clearInterval(t); resolve();
                                      }
                                  }, 150);
                              });
                          }
                      """)
                      await asyncio.sleep(3)

                      await page.evaluate("window.scrollTo(0, 0)")
                      await asyncio.sleep(1)

                      result   = await cdp.send("Page.captureSnapshot", {"format": "mhtml"})
                      data     = result["data"]
                      size_kb  = len(data.encode("utf-8")) / 1024
                      css_cnt  = data.count("Content-Type: text/css")
                      print(f"[INFO] {NAME} - CSS {css_cnt}개 / {size_kb:.1f} KB")

                      if size_kb < MIN_SIZE:
                          raise Exception(f"크기 미달 ({size_kb:.1f} KB < {MIN_SIZE} KB)")
                      if css_cnt < MIN_CSS:
                          raise Exception(f"CSS 부족 ({css_cnt}개 < {MIN_CSS}개) - 로딩 상태")

                      with open(f"/tmp/{NAME}.mhtml", "w", encoding="utf-8") as f:
                          f.write(data)
                      print(f"[완료] /tmp/{NAME}.mhtml ({size_kb:.1f} KB)")

                  finally:
                      await browser.close()

          async def main():
              for attempt in range(1, MAX_RETRY + 1):
                  try:
                      await capture()
                      return  # 성공
                  except Exception as e:
                      print(f"[WARN] {NAME} 시도 {attempt}/{MAX_RETRY} 실패: {e}")
                      if attempt < MAX_RETRY:
                          delay = 60 if "CSS" in str(e) else 30
                          print(f"[RETRY] {delay}초 대기 후 재시도")
                          await asyncio.sleep(delay)
                      else:
                          print(f"[ERROR] {NAME} 최종 실패")
                          sys.exit(1)   # job 실패 표시 → artifact 미업로드

          asyncio.run(main())
          EOF

      - name: Upload MHTML artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mhtml-${{ matrix.name }}
          path: /tmp/${{ matrix.name }}.mhtml
          retention-days: 1

  # ══════════════════════════════════════════════════
  # Job 2: 변환 및 배포 (capture 완료 후 실행)
  # ══════════════════════════════════════════════════
  convert-and-deploy:
    needs: capture
    if: always()           # capture 일부 실패해도 반드시 실행
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Download MHTML artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mhtml-*
          path: /tmp/mhtml/
          merge-multiple: true
        continue-on-error: true   # 일부 artifact 없어도 계속 진행

      - name: Convert MHTML to HTML
        run: |
          mkdir -p subnote
          for name in db ai sec nw sw al st caos bizpm ds gr; do
            mhtml="/tmp/mhtml/${name}.mhtml"
            html="subnote/${name}.html"
            if [ -f "$mhtml" ]; then
              python3 scripts/mhtml_to_html.py "$mhtml" "$html"
            else
              echo "[SKIP] ${name} - MHTML 없음, 기존 HTML 유지"
            fi
          done

      - name: Generate mem.html
        run: python3 scripts/gen_mem.py

      # ────────────────────────────────────────
      # 토픽 분할 — 성공 도메인만 초기화 후 재생성
      # ────────────────────────────────────────
      - name: Split into topics
        run: |
          mkdir -p subnote/topics
          pip install beautifulsoup4 -q

          # 오늘 변환에 성공한 도메인만 topics/ 초기화
          for name in db ai sec nw sw al st caos bizpm ds gr; do
            html="subnote/${name}.html"
            if [ -f "$html" ] && [ $(wc -c < "$html") -gt 100000 ]; then
              echo "[초기화] subnote/topics/${name}/"
              rm -rf "subnote/topics/${name}/"
            fi
          done

          python3 scripts/gen_topics.py

      - name: Generate index.html
        run: |
          python3 << 'EOF'
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST).strftime("%Y-%m-%d %H:%M KST")

          pages = [
              ("db",    "DB",     "데이터베이스"),
              ("ai",    "AI",     "인공지능"),
              ("sec",   "SEC",    "정보보안"),
              ("nw",    "NW",     "네트워크"),
              ("sw",    "SW",     "소프트웨어공학"),
              ("al",    "AL",     "알고리즘"),
              ("st",    "ST",     "통계/수학"),
              ("caos",  "CA/OS",  "컴퓨터구조/운영체제"),
              ("bizpm", "BIZ/PM", "경영/프로젝트관리"),
              ("ds",    "DS",     "디지털서비스"),
              ("gr",    "GR",     "가이드/법제도/표준"),
          ]

          items_html = """
                <li class="mem-item">
                  <a href="mem.html">
                    <span class="label" style="background:#d44c47;color:#fff;padding:2px 8px;border-radius:4px;">📝 두음</span>
                    <span class="desc">전 도메인 두음 모음</span>
                  </a>
                </li>"""

          for fname, label, desc in pages:
              items_html += f"""
                <li>
                  <a href="{fname}.html">
                    <span class="label">{label}</span>
                    <span class="desc">{desc}</span>
                  </a>
                </li>"""

          html = f"""<!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>서브노트 목록</title>
            <style>
              body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                     max-width: 640px; margin: 60px auto; padding: 0 20px; color: #333; }}
              h1 {{ font-size: 1.6rem; margin-bottom: 8px; }}
              .updated {{ color: #999; font-size: 0.85rem; margin-bottom: 32px; }}
              ul {{ list-style: none; padding: 0; }}
              li {{ margin-bottom: 12px; }}
              a {{ display: flex; align-items: center; gap: 12px; padding: 14px 18px;
                   border: 1px solid #e5e5e5; border-radius: 8px; text-decoration: none;
                   color: inherit; transition: background 0.15s; }}
              a:hover {{ background: #f7f7f7; }}
              .label {{ font-weight: 600; font-size: 1rem; min-width: 64px; }}
              .desc {{ color: #666; font-size: 0.9rem; }}
            </style>
          </head>
          <body>
            <h1>📚 서브노트</h1>
            <p class="updated">마지막 업데이트: {now}</p>
            <ul>{items_html}
            </ul>
          </body>
          </html>"""

          with open("subnote/index.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("[완료] subnote/index.html 생성")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subnote/
          if git diff --cached --quiet; then
            echo "[INFO] 변경사항 없음 - 커밋 스킵"
          else
            git commit -m "chore: sync notion subnotes [$(date +'%Y-%m-%d' -d '+9 hours')]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
